name: Build LPNU v2.0

on:
  workflow_dispatch:

jobs:
  build-elf:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false
        lfs: false
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libssl-dev git uuid-dev
        git clone --depth 1 https://github.com/linux-apfs/linux-apfs-rw.git linux-7.0/fs/apfs
        git clone --depth 1 https://github.com/shinh/maloader.git maloader
    
    - name: Create sys/sysctl.h stub
      run: |
        mkdir -p maloader/include/sys
        printf '#ifndef _SYS_SYSCTL_H\n#define _SYS_SYSCTL_H\n#define CTL_KERN 1\n#define KERN_JOBSIZE 48\n#endif\n' > maloader/include/sys/sysctl.h

    - name: Build Maloader (ELF)
      run: |
        cd maloader
        make release

    - name: Build LPNU module
      run: |
        cd linux-7.0/fs/lpnu
        make KERNEL_DIR=/usr/src/linux-headers-$(uname -r)/

    - name: Build APFS (read-write)
      run: |
        cd linux-7.0/fs/apfs
        make KERNEL_DIR=/usr/src/linux-headers-$(uname -r)/

    - name: Verify modules
      run: |
        echo "=== ELF Headers ==="
        for f in linux-7.0/fs/lpnu/*.ko linux-7.0/fs/apfs/*.ko maloader/ld-mac; do
          [ -f "$f" ] && xxd -l 16 "$f"
        done

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: lpnu-v2
        path: |
          linux-7.0/fs/lpnu/*.ko
          linux-7.0/fs/apfs/*.ko
          maloader/ld-mac