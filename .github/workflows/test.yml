name: Test LPNU Modules

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Download release
      run: |
        mkdir -p modules
        gh release download v1.0.0 -p "modules/*" --repo geomoded-sdk/lpnu || true
        ls -la modules/
        
    - name: Check ELF headers
      run: |
        for f in modules/*.ko modules/ld-mac; do
          if [ -f "$f" ]; then
            echo "=== $f ==="
            xxd -l 16 "$f"
          fi
        done
    
    - name: File info
      run: |
        file modules/*