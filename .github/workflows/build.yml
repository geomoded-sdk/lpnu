name: Build LPNU Kernel with Maloader

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false
        lfs: false
    
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libssl-dev git uuid-dev libc6-dev-i386
        git clone --depth 1 https://github.com/linux-apfs/linux-apfs-rw.git linux-7.0/fs/apfs
        git clone --depth 1 https://github.com/shinh/maloader.git maloader
    
    - name: Create sys/sysctl.h stub
      run: |
        echo '#ifndef _SYS_SYSCTL_H' > maloader/include/sys/sysctl.h
        echo '#define _SYS_SYSCTL_H' >> maloader/include/sys/sysctl.h
        echo '#define CTL_KERN 2' >> maloader/include/sys/sysctl.h
        echo '#define KERN_JOBSIZE 48' >> maloader/include/sys/sysctl.h
        cat maloader/include/sys/sysctl.h
    
    - name: Build Maloader
      run: |
        cd maloader
        make release
        ls -la ld-mac
        
    - name: Build LPNU module
      run: |
        cd linux-7.0/fs/lpnu
        make KERNEL_DIR=/usr/src/linux-headers-$(uname -r)/
        
    - name: Build APFS module
      run: |
        cd linux-7.0/fs/apfs
        make KERNEL_DIR=/usr/src/linux-headers-$(uname -r)/
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lpnu-all
        path: |
          linux-7.0/fs/lpnu/*.ko
          linux-7.0/fs/apfs/*.ko
          maloader/ld-mac
          maloader/libmac/*.so