name: Build LPNU Kernel with Maloader

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false
        lfs: false
    
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libssl-dev git uuid-dev libc6-dev-i386 bc bison flex libelf-dev ccache
        git clone --depth 1 https://github.com/linux-apfs/linux-apfs-rw.git linux-7.0/fs/apfs
        git clone --depth 1 https://github.com/shinh/maloader.git maloader
    
    - name: Create sys/sysctl.h stub
      run: |
        mkdir -p maloader/include/sys
        printf '#ifndef _SYS_SYSCTL_H\n#define _SYS_SYSCTL_H\n#define CTL_KERN 1\n#define KERN_JOBSIZE 48\n#endif\n' > maloader/include/sys/sysctl.h
    
    - name: Build Maloader
      run: |
        cd maloader
        make release
        ls -la ld-mac
    
    - name: Download Linux kernel source v7.0
      run: |
        git clone --depth 1 --branch v7.0 https://github.com/torvalds/linux.git linux-kernel
        cd linux-kernel
        make defconfig
        echo "CONFIG_LPNU=y" >> .config
        echo "CONFIG_IOKIT=m" >> .config
        echo "CONFIG_LPNU_DRIVER=m" >> .config
        echo "CONFIG_MAC=m" >> .config
    
    - name: Copy LPNU modules to kernel tree
      run: |
        cp -r lpnu linux-kernel/fs/
        ls -la linux-kernel/fs/lpnu
    
    - name: Configure ccache
      run: |
        echo "90" | sudo tee /proc/sys/vm/drop_caches
        ccache -M 2G
        ccache -z
    
    - name: Build Linux kernel with LPNU (this may take hours)
      run: |
        cd linux-kernel
        make -j$(nproc) 2>&1 | tail -100
        echo "Build completed, checking for kernel..."
        ls -la vmlinux 2>/dev/null || ls -la arch/x86_64/boot/vmlinux 2>/dev/null || echo "Kernel not found in standard locations"
    
    - name: Check build output
      run: |
        cd linux-kernel
        echo "=== Kernel image ==="
        ls -lh vmlinux 2>/dev/null || ls -lh arch/x86_64/boot/vmlinux 2>/dev/null || echo "No kernel found"
        echo "=== Modules ==="
        find . -name "*.ko" -size +1M 2>/dev/null | head -10
        echo "=== Build time ==="
        ccache -s
    
    - name: Upload kernel artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: lpnu-kernel-all
        path: |
          linux-kernel/vmlinux
          linux-kernel/arch/x86_64/boot/vmlinux
          linux-kernel/*.ko
          linux-kernel/fs/lpnu/*.ko
          linux-kernel/fs/apfs/*.ko
          maloader/ld-mac
          maloader/libmac/*.so