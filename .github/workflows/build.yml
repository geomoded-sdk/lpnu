name: Build LPNU Kernel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false
        lfs: false
    
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libssl-dev linux-headers-$(uname -r)
        git clone --depth 1 https://github.com/linux-apfs/linux-apfs-rw.git linux-7.0/fs/apfs
    
    - name: Build binfmt_mach_o
      run: |
        cd linux-7.0/fs
        cp binfmt_mach_o.c /usr/src/linux-headers-$(uname -r)/fs/
        make -C /usr/src/linux-headers-$(uname -r)/ M=$(pwd) fs/binfmt_mach_o.o
    
    - name: Build LPNU module
      run: |
        cd linux-7.0/fs/lpnu
        make KERNEL_DIR=/usr/src/linux-headers-$(uname -r)/
        
    - name: Build APFS module
      run: |
        cd linux-7.0/fs/apfs
        make KERNEL_DIR=/usr/src/linux-headers-$(uname -r)/
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lpnu-modules
        path: |
          linux-7.0/fs/lpnu/*.ko
          linux-7.0/fs/apfs/*.ko
          linux-7.0/fs/*.ko