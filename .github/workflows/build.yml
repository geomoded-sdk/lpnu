name: Build LPNU Kernel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential bc kmod cpio libssl-dev
    
    - name: Build kernel
      run: |
        cd linux-7.0
        make defconfig
        sed -i 's/# CONFIG_LPNU is not set/CONFIG_LPNU=y/' .config
        sed -i 's/# CONFIG_LPNU_APFS is not set/CONFIG_LPNU_APFS=y/' .config
        sed -i 's/# CONFIG_LPNU_HFS is not set/CONFIG_LPNU_HFS=y/' .config
        sed -i 's/# CONFIG_LPNU_MACHO is not set/CONFIG_LPNU_MACHO=y/' .config
        sed -i 's/# CONFIG_LPNU_KEXT is not set/CONFIG_LPNU_KEXT=y/' .config
        sed -i 's/# CONFIG_APFS_FS is not set/CONFIG_APFS_FS=y/' .config
        make -j$(nproc)
    
    - name: Build APFS module
      run: |
        cd linux-7.0/fs/apfs
        make
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lpnu-kernel
        path: |
          linux-7.0/vmlinux
          linux-7.0/fs/apfs/*.ko