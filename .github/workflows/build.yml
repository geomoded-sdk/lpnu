name: Build LPNU Kernel with Maloader

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false
        lfs: false
    
    - name: Install PRECOMPILED kernel and build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libssl-dev git uuid-dev libc6-dev-i386
        sudo apt-get install -y linux-image-generic linux-headers-generic
        uname -r
        ls /boot/
        ls /lib/modules/
    
    - name: Download and extract precompiled kernel
      run: |
        mkdir -p kernel-output
        cp /boot/vmlinuz-* kernel-output/vmlinuz 2>/dev/null || true
        cp /boot/initrd.img-* kernel-output/initrd.img 2>/dev/null || true
        cp /boot/config-* kernel-output/config 2>/dev/null || true
        ls -lh kernel-output/
    
    - name: Build Maloader
      run: |
        git clone --depth 1 https://github.com/shinh/maloader.git maloader
        cd maloader
        mkdir -p include/sys
        printf '#ifndef _SYS_SYSCTL_H\n#define _SYS_SYSCTL_H\n#define CTL_KERN 1\n#define KERN_JOBSIZE 48\n#endif\n' > include/sys/sysctl.h
        make release
        ls -la ld-mac
    
    - name: Build LPNU module against PRECOMPILED kernel
      run: |
        KERNEL_VERSION=$(ls /lib/modules/ | head -1)
        echo "Building against kernel: $KERNEL_VERSION"
        cd linux-7.0/fs/lpnu
        make KERNEL_DIR=/lib/modules/$KERNEL_VERSION/
        ls -lh *.ko
    
    - name: Build APFS module against PRECOMPILED kernel
      run: |
        KERNEL_VERSION=$(ls /lib/modules/ | head -1)
        git clone --depth 1 https://github.com/linux-apfs/linux-apfs-rw.git ../linux-apfs-temp
        cd ../linux-apfs-temp
        make KERNEL_DIR=/lib/modules/$KERNEL_VERSION/
        mv apfs.ko ../linux-7.0/fs/
        ls -lh ../linux-7.0/fs/apfs.ko
    
    - name: Package PRECOMPILED kernel with LPNU modules
      run: |
        mkdir -p lpnu-kernel-package
        KERNEL_VERSION=$(ls /lib/modules/ | head -1)
        
        cp /boot/vmlinuz-* lpnu-kernel-package/vmlinuz
        cp /boot/initrd.img-* lpnu-kernel-package/initrd.img
        cp /boot/System.map-* lpnu-kernel-package/System.map
        cp /boot/config-* lpnu-kernel-package/config
        
        cp linux-7.0/fs/lpnu/lpnu.ko lpnu-kernel-package/
        cp linux-7.0/fs/apfs/apfs.ko lpnu-kernel-package/
        
        cp maloader/ld-mac lpnu-kernel-package/
        cp -r maloader/libmac lpnu-kernel-package/
        
        echo "=== LPNU Kernel Package ===" > lpnu-kernel-package/README.txt
        echo "Kernel: PRECOMPILED from Ubuntu" >> lpnu-kernel-package/README.txt
        echo "Modules: lpnu.ko + apfs.ko" >> lpnu-kernel-package/README.txt
        echo "Loader: ld-mac (Mach-O to ELF)" >> lpnu-kernel-package/README.txt
        echo "" >> lpnu-kernel-package/README.txt
        echo "Contents:" >> lpnu-kernel-package/README.txt
        ls -lh lpnu-kernel-package/*.ko >> lpnu-kernel-package/README.txt
        cat lpnu-kernel-package/README.txt
        echo ""
        ls -lh lpnu-kernel-package/
    
    - name: Upload LPNU kernel package
      uses: actions/upload-artifact@v4
      with:
        name: lpnu-kernel-package
        path: lpnu-kernel-package/*