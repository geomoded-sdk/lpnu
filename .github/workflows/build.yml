name: Build LPNU Kernel with Maloader

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false
        lfs: false
    
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libssl-dev git uuid-dev libc6-dev-i386 bc bison flex libelf-dev
        git clone --depth 1 https://github.com/linux-apfs/linux-apfs-rw.git linux-7.0/fs/apfs
        git clone --depth 1 https://github.com/shinh/maloader.git maloader
    
    - name: Create sys/sysctl.h stub
      run: |
        mkdir -p maloader/include/sys
        printf '#ifndef _SYS_SYSCTL_H\n#define _SYS_SYSCTL_H\n#define CTL_KERN 1\n#define KERN_JOBSIZE 48\n#endif\n' > maloader/include/sys/sysctl.h
    
    - name: Build Maloader
      run: |
        cd maloader
        make release
        ls -la ld-mac
        
    - name: Download Linux kernel source
      run: |
        if [ ! -d "linux-7.0" ]; then
          git clone --depth 1 --branch v7.0 https://github.com/torvalds/linux.git linux-7.0
        fi
        cd linux-7.0
        make defconfig
    
    - name: Copy LPNU modules to kernel
      run: |
        cp -r ../lpnu linux-7.0/fs/
        cp -r ../linux-7.0/fs/lpnu linux-7.0/fs/ 2>/dev/null || true
        rm -rf linux-7.0/fs/lpnu
        cp -r ../lpnu linux-7.0/fs/lpnu
    
    - name: Configure kernel with LPNU
      run: |
        cd linux-7.0
        echo "CONFIG_MAC=y" >> .config
        echo "CONFIG_LPNU=y" >> .config
        echo "CONFIG_IOKIT=y" >> .config
        echo "CONFIG_LPNU_DRIVER=m" >> .config
        make olddefconfig
    
    - name: Build LPNU module
      run: |
        cd linux-7.0/fs/lpnu
        make KERNEL_DIR=/usr/src/linux-headers-$(uname -r)/
        
    - name: Build APFS module
      run: |
        cd linux-7.0/fs/apfs
        make KERNEL_DIR=/usr/src/linux-headers-$(uname -r)/
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lpnu-all
        path: |
          linux-7.0/fs/lpnu/*.ko
          linux-7.0/fs/apfs/*.ko
          maloader/ld-mac
          maloader/libmac/*.so